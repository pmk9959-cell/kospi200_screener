# KOSPI 200 Screener — 전략 설정
# Phase 1에서는 indicators/cache 섹션만 사용. strategies 블록은 Phase 2+ 용 미리 정의.

universe:
  index_name: KOSPI200
  index_code: "1028"           # pykrx KRX 지수 코드
  exclude_status:
    - 거래정지
    - 관리종목
    - 투자유의

cache:
  ohlcv_ttl_hours: 24
  fundamental_ttl_hours: 24
  consensus_ttl_hours: 24
  ticker_list_ttl_days: 30

indicators:
  ma_periods: [5, 20, 60, 120, 200]
  rsi_period: 14
  macd:
    fast: 12
    slow: 26
    signal: 9
  stochastic:
    k_period: 14
    k_smooth: 3
    d_period: 3
  bollinger:
    period: 20
    std: 2.0
  atr_period: 14
  adx_period: 14
  obv: true

# --- Phase 2 이후 사용 ---
strategies:
  short_term:
    horizon_days: [3, 10]
    weights:    {technical: 0.80, fundamental: 0.10, valuation: 0.05, consensus: 0.05}
    risk:       {atr_stop_mult: 1.5, target_r: 1.5}
    filters:
      min_avg_trading_value_20d_won: 5_000_000_000   # 50억원

  medium_term:
    horizon_months: [1, 3]
    weights:    {technical: 0.50, fundamental: 0.25, valuation: 0.15, consensus: 0.10}
    risk:       {atr_stop_mult: 2.0, target_r: 2.0}
    filters:
      min_consecutive_quarters_op_profit: 4
      max_debt_ratio: 200          # 금융업 제외
      min_roe_ttm: 5.0

  long_term:
    horizon_min_months: 3
    weights:    {technical: 0.30, fundamental: 0.35, valuation: 0.20, consensus: 0.15}
    risk:       {atr_stop_mult: 2.5, target_r: 3.0}
    filters:
      consecutive_years_op_profit: 3
      min_avg_roe_3y: 10.0
      min_op_cagr_3y: 0.0

backtest:
  in_sample:  {start: "2018-01-01", end: "2024-12-31"}
  out_sample: {start: "2025-01-01", end: null}        # null = 최신
  cost:
    slippage_pct: 0.001
    commission_pct: 0.00015
    sales_tax_pct: 0.0018       # 매도시
  position:
    max_per_ticker: 0.10
